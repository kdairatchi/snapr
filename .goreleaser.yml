version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "snapr_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: kdairatchi
    name: snapr

brews:
  - name: snapr
    repository:
      owner: kdairatchi
      name: homebrew-tap
    homepage: https://github.com/kdairatchi/snapr
    description: Screenshot any web project — local, live, or CI
