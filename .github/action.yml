name: snapr
description: Screenshot your web project routes on every deploy
author: kdairatchi

inputs:
  config:
    description: Path to snapr.toml
    required: false
    default: snapr.toml
  url:
    description: Single URL to screenshot (alternative to config)
    required: false
  format:
    description: Output format — png, pdf, or webp
    required: false
    default: png
  out:
    description: Output directory
    required: false
    default: screenshots
  full:
    description: Capture full page height
    required: false
    default: "true"
  upload:
    description: Upload screenshots as workflow artifact
    required: false
    default: "true"
  version:
    description: snapr version to use
    required: false
    default: latest

outputs:
  screenshots-dir:
    description: Directory containing screenshots
    value: ${{ inputs.out }}

runs:
  using: composite
  steps:
    - name: Install snapr
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -s https://api.github.com/repos/kdairatchi/snapr/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
        fi
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m | sed 's/x86_64/amd64/' | sed 's/aarch64/arm64/')
        BASE_URL="https://github.com/kdairatchi/snapr/releases/download/${VERSION}"
        ARCHIVE="snapr_${OS}_${ARCH}.tar.gz"
        curl -sSL "${BASE_URL}/${ARCHIVE}" -o /tmp/snapr.tar.gz
        curl -sSL "${BASE_URL}/checksums.txt" -o /tmp/snapr.checksums
        grep "${ARCHIVE}" /tmp/snapr.checksums | sha256sum -c -
        tar -xz -C /usr/local/bin snapr < /tmp/snapr.tar.gz
        chmod +x /usr/local/bin/snapr

    - name: Run snapr
      shell: bash
      env:
        SNAPR_URL: ${{ inputs.url }}
        SNAPR_CONFIG: ${{ inputs.config }}
        SNAPR_FORMAT: ${{ inputs.format }}
        SNAPR_OUT: ${{ inputs.out }}
        SNAPR_FULL: ${{ inputs.full }}
      run: |
        SNAP_ARGS=()
        if [ -n "$SNAPR_URL" ]; then
          SNAP_ARGS+=("$SNAPR_URL")
        elif [ -f "$SNAPR_CONFIG" ]; then
          SNAP_ARGS+=("--config" "$SNAPR_CONFIG")
        fi
        SNAP_ARGS+=("--format" "$SNAPR_FORMAT")
        SNAP_ARGS+=("--out" "$SNAPR_OUT")
        if [ "$SNAPR_FULL" = "true" ]; then
          SNAP_ARGS+=("--full")
        fi
        snapr snap "${SNAP_ARGS[@]}"

    - name: Upload screenshots
      if: ${{ inputs.upload == 'true' }}
      uses: actions/upload-artifact@v4
      with:
        name: snapr-screenshots
        path: ${{ inputs.out }}/
        retention-days: 30
